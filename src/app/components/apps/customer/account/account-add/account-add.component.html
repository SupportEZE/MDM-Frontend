<div class="box" *ngIf="skLoading">
  <div class="p-4">
    <div class="grid grid-cols-12 gap-x-6">
      <div
        class="xl:col-span-3 col-span-12 mb-4"
        *ngFor="let card of [].constructor(10)"
      >
        <app-skeleton></app-skeleton>
      </div>
    </div>
  </div>
</div>
<div
  class="xl:col-span-12 col-span-12"
  *ngIf="!skLoading && showAccount"
>
  <app-showcode-card
    [title]="'Account Approval'"
    [class]="'box-title font-bold text-[15px] block text-primary'"
    [boxHeader]="'pb-0'"
    [titleView]="true"
  >
    <form [formGroup]="accountForm" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-12 sm:gap-x-6 gap-y-4 gap-x-4">
        <!-- STATUS -->
        <div class="xl:col-span-3 col-span-12 mb-3">
          <label class="block text-sm font-medium mb-2">
            Status <span class="text-red-500">*</span>
          </label>

          <mat-radio-group formControlName="account_status" class="flex gap-6">
            <mat-radio-button value="Approve">Approve</mat-radio-button>
            <mat-radio-button value="Reject">Reject</mat-radio-button>
          </mat-radio-group>
        </div>

        <!-- REMARK -->
        <div
          class="xl:col-span-3 col-span-12"
          *ngIf="accountForm.get('account_status')?.value === 'Reject'"
        >
          <spk-input
            label="Remark"
            formControlName="account_remark"
            [fieldReq]="true"
            class="remove-default-class"
            type="text"
          >
          </spk-input>
        </div>

        <div class="xl:col-span-3 col-span-12 mb-3" *ngIf="isAccountLogin">
          <label class="form-label mb-0">Other Attachments</label>
          <file-pond
            class="filepond basic-filepond"
            [options]="getPondOptions()"
            [files]="pondFiles['accounts_attachments']"
            (onremovefile)="onFileRemove($event, 1, 'accounts_attachments')"
            (onprocessfile)="
              onFileProcessed($event, 'upload', 1, 'accounts_attachments')
            "
          ></file-pond>
        </div>
      </div>

      <div
        class="box-footer border-t border-block-start-dashed sm:flex justify-end text-right pr-0"
        *ngIf="isAccountLogin"
      >
        <app-button
          [buttonType]="'submit'"
          [buttonClass]="'ti-btn ti-btn-primary m-0'"
          [disabled]="api.disabled"
          [formType]="pageType"
          [iconClass]="'ri-save-line'"
          [loadingIconClass]="'ri-loader-2-fill'"
        ></app-button>
      </div>
    </form>
  </app-showcode-card>
</div>

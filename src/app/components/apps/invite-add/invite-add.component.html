<app-page-header [title]="'Business Partner'" [title1]="'Business Partner'">
</app-page-header>

<div class="xl:col-span-12 col-span-12" *ngIf="!skLoading">
  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
    <div class="box">
      <div class="p-4">
        <div class="grid grid-cols-12 sm:gap-x-4 sm:gap-y-2">
          <div class="xl:col-span-2 col-span-12 mb-3">
            <spk-input
              label=" Partner Mobile No."
              formControlName="mobile"
              [fieldReq]="true"
              class="remove-default-class"
              type="text"
              (keypress)="formValidation.handleInputFilter($event, 'mobile')"
            ></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-input
              label=" Partner email Id"
              formControlName="email"
              [fieldReq]="true"
              class="remove-default-class"
              type="email"
            ></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12">
            <spk-input
              style="text-transform: lowercase !important"
              label="email Id (Ozone Team) "
              formControlName="email_cc"
              class="remove-default-class lowercase"
              type="email"
            ></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mt-7">
            <app-button
              [buttonType]="'submit'"
              [buttonClass]="'ti-btn ti-btn-primary m-0'"
              [disabled]="api.disabled"
              [formType]="pageType"
              [iconClass]="'ri-send-plane-line'"
              [label]="'Onboarding Invite'"
              [loadingIconClass]="'ri-loader-2-fill'"
            ></app-button>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<app-page-header [title]="'User'" [title1]="['User']" [activeitem]="(pageType | titlecase) + ' User'"></app-page-header>
<div class="box" *ngIf="skLoading">
  <div class="p-4">
    <div class="grid grid-cols-12 gap-x-6">
      <div class="xl:col-span-3 col-span-12 mb-4" *ngFor="let card of [].constructor(10)">
        <app-skeleton></app-skeleton>
      </div>
    </div>
  </div>
</div>
<div class="xl:col-span-12 col-span-12" *ngIf="!skLoading">
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="box">
      <div class="p-4">
        <div class="grid grid-cols-12 sm:gap-x-6">
          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-input label="Name" formControlName="name" [fieldReq]="true" class="remove-default-class"
              type="text"></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-input label="Mobile" formControlName="mobile" [fieldReq]="true" class="remove-default-class"
              type="text" (keypress)="formValidation.handleInputFilter($event, 'mobile')"></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-input label="User Code" formControlName="user_code" [fieldReq]="true" class="remove-default-class"
              type="text"></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-input label="Email" formControlName="email" class="remove-default-class" type="email"></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-input label="Department" formControlName="department" class="remove-default-class" [fieldReq]="true"
              type="text"></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-input label="Designation" formControlName="designation" class="remove-default-class" [fieldReq]="true"
              type="text"></spk-input>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-ng-select formControlName="location_id" label="Base Location" [fieldReq]="true" [search]="true"
              [options]="zoneOptions" [multiple]="false">
            </spk-ng-select>
          </div>

          <div class="xl:col-span-3 col-span-12 mb-3">
            <spk-ng-select formControlName="zone_id" label="Zone" [fieldReq]="true" [search]="true"
              [options]="subZoneOptions" [multiple]="false">
            </spk-ng-select>
          </div>

          <ng-container *ngIf="showReportingManager">
            <div class="xl:col-span-3 col-span-12 mb-3">
              <spk-ng-select formControlName="reporting_manager_id" label="Reporting Manager" [fieldReq]="false"
                [search]="true" [options]="reportingManagerOptions">
              </spk-ng-select>
            </div>
          </ng-container>

        </div>
      </div>

      <div class="box-footer border-t border-block-start-dashed sm:flex justify-end">
        <app-button [buttonType]="'submit'" [buttonClass]="'ti-btn ti-btn-primary m-0'" [disabled]="api.disabled"
          [formType]="pageType" [iconClass]="'ri-save-line'" [loadingIconClass]="'ri-loader-2-fill'"></app-button>
      </div>
    </div>
  </form>
</div>

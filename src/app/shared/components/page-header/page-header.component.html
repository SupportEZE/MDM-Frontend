<!-- Start::page-header -->
<div
  class="flex items-center justify-between page-header-breadcrumb mb-4 flex-wrap gap-2 single-page-header"
  *ngIf="coman?.userData"
>
  <div>
    <nav aria-label="nav">
      <ol class="breadcrumb mb-1">
        <li>
          <!-- li  class="breadcrumb-item" -->
          <a
            (click)="back()"
            class="flex items-center mr-3 font-medium text-primary"
          >
            <i class="material-icons ms-1">arrow_back_ios</i>
            Back
          </a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">{{ title1 }}</li>
      </ol>
    </nav>
    <h1 class="page-title font-medium text-lg mb-0">{{ activeitem }}</h1>
  </div>

  <div class="flex gap-2 align-middle">
    <form [formGroup]="filterForm" *ngIf="filterForm">
      @if (showSelectOption) {
        <spk-ng-select
          formControlName="select_value"
          [label]="filterLabel ? labelName : ''"
          [options]="optionArray"
          [multiple]="multiple"
          [search]="search"
          (searchChanged)="onsearchChangeHanler($event)"
          (selectedChange)="onSingleSelectChangeHandler($event)"
        ></spk-ng-select>
      }
      @if (showDatePicker) {
        <div class="input-group">
          <!-- <div class="input-group-text !text-textmuted dark:text-textmuted/50 !border-inputborder dark:!border-defaultborder/10"> <i class="ri-calendar-line"></i> </div> -->
          <!-- <spk-flatpickr placeholder="Choose Date" class="form-control custom-datepickr" [mode]="'single'" [altInput]="false" [convertModelValue]="true" [enableTime]="false" [dateFormat]="'Y-m-d'"></spk-flatpickr> -->
        </div>
      }
    </form>

    <div class="btn-list">
      <button
        type="button"
        class="ti-btn ti-btn-sm ti-btn-soft-primary btn-wave"
        (click)="onButtonClick()"
        *ngIf="btnShow"
        [disabled]="btnDisabled"
        style="width: max-content"
      >
        <i class="material-icons ms-1">{{ icon }}</i
        >{{ buttonText }}
      </button>
      <button
        type="button"
        class="ti-btn ti-btn-sm ti-btn-soft-primary1 btn-wave"
        [attr.data-hs-overlay]="dataHsOverlay ? dataHsOverlay : null"
        (click)="onButtonClick1()"
        *ngIf="btnShow1"
        style="width: max-content"
      >
        <i class="material-icons ms-1">{{ icon1 }}</i> {{ buttonText1 }}
      </button>
    </div>
  </div>
</div>
<!-- End::page-header -->

<header class="default-header" *ngIf="!coman?.userData">
  <div class="flex items-center justify-between wp100">
    <img
      src="./assets/images/brand-logos/desktop-logo.png"
      alt="logo"
      class="block h30"
    />

    <a class="font-medium text-[14px] text-white">Welcome to Ozone</a>
  </div>
  <h1 class="page-title font-medium text-lg text-white mt-3 mb-0">
    {{ activeitem }}
  </h1>
</header>
